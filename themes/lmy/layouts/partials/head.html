<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . | relURL }}" />{{ end }}
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/index.xml" | relURL }}" />
<meta name="robots" content="index, follow" />
<meta name="author" content="{{ .Site.Params.author }}" />
{{ with .Permalink }}<link rel="canonical" href="{{ . }}" />{{ end }}
{{ with .Site.Params.images }}<meta property="og:image" content="{{ index . 0 | absURL }}" />{{ end }}
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
<script>
  (function() {
    var media = window.matchMedia('(prefers-color-scheme: dark)');

    function syncGiscus(theme) {
      var frame = document.querySelector('iframe.giscus-frame');
      if (frame) {
        frame.contentWindow.postMessage({ giscus: { setConfig: { theme: theme } } }, 'https://giscus.app');
      }
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      syncGiscus(theme);
    }

    function systemTheme() {
      return media.matches ? 'dark' : 'light';
    }

    function savedTheme() {
      try {
        return localStorage.getItem('lmy-theme');
      } catch (e) {
        return null;
      }
    }

    window.lmySetTheme = setTheme;
    window.lmyToggleTheme = function() {
      var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      try {
        localStorage.setItem('lmy-theme', theme);
      } catch (e) {}
      setTheme(theme);
    };

    setTheme(savedTheme() || systemTheme());
    media.addEventListener('change', function() {
      if (!savedTheme()) {
        setTheme(systemTheme());
      }
    });
  })();
</script>
