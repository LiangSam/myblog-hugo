<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
{{ with .Site.Params.favicon }}<link rel="icon" href="{{ . | relURL }}" />{{ end }}
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "/index.xml" | relURL }}" />
<meta name="robots" content="index, follow" />
{{ with .Permalink }}<link rel="canonical" href="{{ . }}" />{{ end }}
{{ with .Site.Params.images }}<meta property="og:image" content="{{ index . 0 | absURL }}" />{{ end }}
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
<script>
  (function() {
    var saved = localStorage.getItem('lmy-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
  })();
</script>
