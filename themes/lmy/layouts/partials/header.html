<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="site-title" aria-label="{{ .Site.Title }}">
      {{ with .Site.Params.avatar }}<img src="{{ . | relURL }}" alt="{{ $.Site.Title }}" class="site-avatar" />{{ end }}
    </a>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}" class="nav-link{{ if eq $.RelPermalink (.URL | relURL) }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="theme-toggle" aria-label="切换深浅色" onclick="(function(){var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('lmy-theme',t);var f=document.querySelector('iframe.giscus-frame');if(f)f.contentWindow.postMessage({giscus:{setConfig:{theme:t==='dark'?'dark':'light'}}},'https://giscus.app');})()" >
      <span class="icon-sun"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
      <span class="icon-moon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
    </button>
  </div>
</header>
