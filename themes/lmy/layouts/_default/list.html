{{ define "main" }}
<div class="list-header">
  <h1>{{ if eq .Kind "term" }}#{{ end }}{{ .Title }}</h1>
</div>

<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
