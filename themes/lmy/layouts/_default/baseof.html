<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "zh-CN" }}" data-theme="light">
<head>
{{ partial "head.html" . }}
{{ partial "style.html" . }}
</head>
<body class="site-wrapper">
{{ if ne .Section "map" }}{{ partial "header.html" . }}{{ end }}
<main class="{{ if .IsHome }}home-main{{ end }}{{ if eq .Section "map" }} map-main{{ end }}">
{{ block "main" . }}{{ end }}
</main>
{{ if ne .Section "map" }}{{ partial "footer.html" . }}{{ end }}
</body>
</html>
